<html>
    <head>
        <style>
            * {
                font-family: monospace;
            }
            
            html {
                height: 100vh;
            }

            body {
                display: flex;
                margin: 20p;
                gap: 20px;
            }

            section {
                margin-top: 20px;
                margin-bottom: 20px;
            }

            .fancytree-node {
                display: flex !important;
                min-height: auto !important;
                padding-top: 0.1em;
                padding-bottom: 0.1em;
            }

            .fancytree-title {
                font-size: 16px !important;
            }

            .fancytree-custom-icon,
            .fancytree-icon {
                height: 16px !important;
                width: 16px !important;
            }

            .material-icons-round {
                font-size: 16px !important;
                position: relative;
                top: 1px;
            }

            .fancytree-title {
                font-size: 13px !important;
                min-height: auto !important;
            }

            .fancytree-selected {
                background-color: transparent !important;
            }

            ul[role="group"] {
                padding-top: 0em !important;
                padding-left: 0.7em !important;
            }

            .fancytree-container {
                width: 300px;
                overflow: scroll;
                border: none !important;
            }

            .tree-meta {
                width: 300px;
                height: 10px;
            }

            .content {
                display: flex;
                flex-grow: 1;
                flex-direction: column;
            }

            /* Hide scrollbar for Firefox */
            * {
                scrollbar-width: none;
            }

            /* Hide scrollbar for IE and Edge (legacy) */
            * {
                -ms-overflow-style: none;
            }
        </style>

        <script src="/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/jquery.fancytree@2.27.0/dist/jquery.fancytree-all-deps.min.js"></script>
        <link
            href="http://cdn.jsdelivr.net/npm/jquery.fancytree@2.27.0/dist/skin-material/ui.fancytree.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
            rel="stylesheet"
        />
    </head>

    <body>

        </div>

        <div class="tree-meta"></div>

                ],
            };
            document.addEventListener("DOMContentLoaded", function () {
                $("#tree").fancytree({
                    toggleEffect: false,
                    clickFolderMode: 2,
                    extensions: ["persist"],
                    persist: {
                        store: "local", // "cookie", "local" (localStorage), "session"
                        types: "expanded selected", // which states to store
                        // overrideSource: false, // restore initial state
                        cookiePrefix: "fancytree-",
                        cookie: { expires: 365 },
                        expandLazy: true, // expand lazy nodes when restoring
                    },
                    source: nav_source,
                    renderNode: function (event, data) {
                        let expander = data.node.span.querySelector(
                            ".fancytree-expander",
                        );
                        if (expander) {
                            expander.remove();
                        }

                        const onTreeItemClick = (e) => {
                            console.log(e, "clicked");
                            // e.preventDefault()
                            e.stopPropagation();
                        };

                        let title =
                            data.node.span.querySelector(".fancytree-title");
                        if (title) {
                            title.classList.add("text-sm");
                        }
                        if (title && data.node.data.href) {
                            title.innerHTML = `<a href="${data.node.data.href}" class="tree-link">${data.node.title}</a>`;
                            const link = title.querySelector("a");
                            link.addEventListener("click", onTreeItemClick);
                        }

                        let iconSpan = data.node.span.querySelector(
                            'span[role="presentation"]',
                        );
                        if (iconSpan) {
                            console.log(iconSpan);
                            iconSpan.innerHTML = data.node.icon;
                            iconSpan.classList.add("material-icons-round");

                            if (data.node.folder) {
                                if (data.node.expanded) {
                                    iconSpan.innerHTML = "folder_open";
                                } else {
                                    iconSpan.innerHTML = "folder";
                                }
                            } else {
                                if (data.node.icon) {
                                    iconSpan.classList.add(data.node.icon);
                                } else {
                                    iconSpan.classList.add("fa-file");
                                }
                            }
                        }
                        data.node.span.classList.add("tree-item-hover");
                    },
                });
            });
        </script>
