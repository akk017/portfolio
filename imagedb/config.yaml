service:
  enabled: true
  name: shapeshifter
  hostname: 0.0.0.0
  port: 9003
  env: dev # dev, test, stag, prod

service_meta:
  version: "0.0.0-UNVERSIONED"
  domain: "main-dev.fusionforms.app"
  previous_milestone: "0.0.0-ORPHAN"

logs:
  # otel > file, order if in case when multiple are enabled.
  # if both are disabled, then logs will output to console.
  level: debug
  source: false
  file_handler:
    enabled: false
    location: "./process.log"
    json: false
  otel_handler:
    enabled: false

traces:
  export: false

entity:
  pg: # TODO: It should be postgres/main ie <db>/<name>
    enabled: true
    username: postgres
    password:
    database: testdb
    host: localhost
    port: 9023
    ssl: false

key_val:
  badger:
    enabled: true
    path: "./tmp"

mongo:
  enabled: true
  uri: mongodb://localhost:27017/
  database: minibrain
  connect_timeout: 5

cors:
  allow_origins:
    - "http://localhost:5173"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Content-Type"
  expose_headers: []
  allow_credentials: false
  max_age: 86400

view:
  path: "./view"
